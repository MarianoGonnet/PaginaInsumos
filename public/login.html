<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Sistema de Insumos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-body">

  <div class="login-box">
    <h2>Sistema de Insumos</h2>
    <h4>Provincia de Buenos Aires</h4>

    <input id="user" type="text" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>
    <p id="error"></p>
  </div>

<script>
async function login() {
  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      usuario: user.value,
      password: pass.value
    })
  });

  if (res.ok) {
    const data = await res.json();
    if (data.isAdmin) {
      window.location.href = '/admin.html'; // Redirigir al panel de admin
    } else {
      window.location.href = '/panel.html'; // Redirigir al panel normal
    }
  } else {
    error.textContent = 'Usuario o contraseña incorrectos';
  }
}
</script>

</body>
</html>
